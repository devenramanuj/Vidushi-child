<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>વિદુષી - બાળ મિત્ર | સ્માર્ટ સંવાદ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Neue', 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Container */
        .app-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Character Header */
        .character-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 30px 20px 40px 20px;
            text-align: center;
            position: relative;
        }

        .avatar-circle {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            border: 5px solid white;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .avatar-emoji {
            font-size: 70px;
            animation: wave 1s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        .character-name {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-top: 10px;
        }

        .character-tag {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            margin-top: 5px;
        }

        /* Speech Bubble */
        .bubble-container {
            background: white;
            margin: -20px 20px 20px 20px;
            padding: 20px;
            border-radius: 35px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
        }

        .speech-bubble {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 25px;
            font-size: 18px;
            line-height: 1.5;
            color: #2c3e50;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 500;
            border: 2px solid #ffd89a;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 2px solid #f0f0f0;
        }

        .message-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .message-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .message-input:focus {
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245,87,108,0.1);
        }

        .send-btn {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            color: white;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Mic Button */
        .mic-section {
            text-align: center;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 4px solid white;
            border-radius: 50%;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        .mic-btn.listening {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245,87,108,0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(245,87,108,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245,87,108,0); }
        }

        .status-text {
            margin-top: 15px;
            font-size: 14px;
            color: #7f8c8d;
            text-align: center;
        }

        /* Suggestions */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .suggestion-chip {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #555;
        }

        .suggestion-chip:active {
            background: #f5576c;
            color: white;
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Character Header -->
    <div class="character-header">
        <div class="avatar-circle">
            <div class="avatar-emoji" id="avatarEmoji">🧸</div>
        </div>
        <div class="character-name">વિદુષી</div>
        <div class="character-tag">✨ તમારી સ્માર્ટ સાથી ✨</div>
    </div>

    <!-- Speech Bubble -->
    <div class="bubble-container">
        <div class="speech-bubble" id="speechBubble">
            🧸 હેલો! હું વિદુષી છું. મારી સાથે વાત કરો અને મજા કરો!
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="message-box">
            <input type="text" id="messageInput" class="message-input" placeholder="✏️ અહીં લખો અને મને મેસેજ કરો..." autocomplete="off">
            <button class="send-btn" id="sendBtn">📤</button>
        </div>

        <div class="mic-section">
            <button class="mic-btn" id="micBtn">🎤</button>
            <div class="status-text" id="statusText">🔊 માઇક દબાવો અને બોલો</div>
        </div>

        <!-- Quick Suggestions for Kids -->
        <div class="suggestions">
            <div class="suggestion-chip" data-text="નમસ્તે">👋 નમસ્તે</div>
            <div class="suggestion-chip" data-text="તમારું નામ શું છે">❓ નામ શું?</div>
            <div class="suggestion-chip" data-text="મને વાર્તા સંભળાવો">📖 વાર્તા</div>
            <div class="suggestion-chip" data-text="ગીત ગાઓ">🎵 ગીત</div>
            <div class="suggestion-chip" data-text="મને રમવું છે">🎮 રમત</div>
        </div>
    </div>
</div>

<script>
    // DOM Elements
    const speechBubble = document.getElementById('speechBubble');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');
    const avatarEmoji = document.getElementById('avatarEmoji');

    // Speech Recognition Setup
    let recognition = null;
    let isListening = false;
    let currentUtterance = null;

    // Check browser support for Speech Recognition
    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    const hasSpeechRecognition = SpeechRecognitionAPI !== undefined;

    if (hasSpeechRecognition) {
        recognition = new SpeechRecognitionAPI();
        recognition.lang = 'gu-IN';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
    }

    // ========== KID-FRIENDLY RESPONSES DATABASE ==========
    function getVidushiReply(userMessage) {
        const msg = userMessage.toLowerCase().trim();
        
        // Greetings
        if (msg.includes("નમસ્તે") || msg.includes("હેલો") || msg.includes("હાય") || msg.includes("hi") || msg.includes("hello")) {
            return "નમસ્તે મારા દોસ્ત! 🧸 તમે કેમ છો? હું તમારી સાથે વાત કરીને ખૂબ ખુશ છું! 😊";
        }
        
        // Name
        if (msg.includes("નામ") || msg.includes("કોણ") || msg.includes("who are you")) {
            return "મારું નામ વિદુષી છે! 🌸 મને દેવેન્દ્રભાઈ એ બનાવી છે. હું બાળકો સાથે વાત કરવાનું અને રમવાનું પસંદ કરું છું. તમારું નામ શું છે? 🎈";
        }
        
        // How are you
        if (msg.includes("કેમ છો") || msg.includes("how are you")) {
            return "હું તો ઘણી મજામાં છું! 🎉 તમે મારી સાથે વાત કરો છો એટલે મને ખૂબ આનંદ થાય છે. તમે કેમ છો? 😊";
        }
        
        // Stories
        if (msg.includes("વાર્તા") || msg.includes("કહાની") || msg.includes("story")) {
            return "એક વારની વાત છે... એક નાનો સસલો હતો. 🐇 તેને દોડવાની ઘણી મજા આવતી. એક દિવસ તે કાચબા સાથે દોડ લગાવવા ગયો... તમે આગળની વાર્તા સાંભળવા માંગો છો? 📖✨";
        }
        
        // Songs
        if (msg.includes("ગીત") || msg.includes("સંગીત") || msg.includes("song") || msg.includes("sing")) {
            return "ચંદા મામા દૂર કે... 🎵 આહા! મને ગીત ગાવાનું ઘણું ગમે છે. તમે મારી સાથે ગાશો? 'નાની નાની બચ્ચી હો...' 🎤🎶";
        }
        
        // Games
        if (msg.includes("રમ") || msg.includes("રમત") || msg.includes("game") || msg.includes("play")) {
            return "વાહ! ચાલો રમીએ! 🎲 તમને કઈ રમત ગમે છે? છુપાછુપી, લુડો, કે 'આંખ મિચોળી'? મને બધી રમતો આવડે છે! 🎯";
        }
        
        // School / Study
        if (msg.includes("શાળા") || msg.includes("ભણ") || msg.includes("school") || msg.includes("study")) {
            return "શાળા એટલે જ્ઞાનનો ખજાનો! 📚 તમારી શાળામાં શું ભણો છો? મને ગણિત અને વિજ્ઞાન ખૂબ ગમે છે. ભણવામાં મજા આવે છે? ✏️📖";
        }
        
        // Animals
        if (msg.includes("પ્રાણી") || msg.includes("હાથી") || msg.includes("સિંહ") || msg.includes("animal")) {
            return "હાથી ઘણો મોટો અને શક્તિશાળી! 🐘 સિંહ જંગલનો રાજા! 🦁 તમને કયું પ્રાણી સૌથી વધુ ગમે છે? હું તમારા મનપસંદ પ્રાણી વિશે વાત કરવા માંગુ છું! 🦒";
        }
        
        // Colors
        if (msg.includes("રંગ") || msg.includes("color")) {
            return "રંગો તો ખૂબ જ સુંદર હોય છે! 🎨 મને ગુલાબી અને વાદળી રંગ ખૂબ ભાવે છે. તમારો મનપસંદ રંગ કયો છે? ચિત્ર બનાવવાનું પસંદ છે? 🖌️";
        }
        
        // Food / Fruits
        if (msg.includes("ફળ") || msg.includes("ખાવું") || msg.includes("fruit") || msg.includes("food")) {
            return "મને સફરજન અને કેળાં ખૂબ ગમે છે! 🍎🍌 ફળો ખાવાથી શરીર તંદુરસ્ત રહે છે. તમારું પ્રિય ફળ કયું છે? 🍊🥭";
        }
        
        // Family
        if (msg.includes("મમ્મી") || msg.includes("પપ્પા") || msg.includes("ફેમિલી") || msg.includes("family")) {
            return "તમારા મમ્મી-પપ્પા ખૂબ સારા લાગે છે! ❤️ પરિવાર સાથે સમય પસાર કરવો એ ખૂબ જ મજાનું હોય છે. તમે તમારા પરિવાર સાથે શું કરવાનું પસંદ કરો છો? 🏠";
        }
        
        // Bye
        if (msg.includes("બાય") || msg.includes("આવજો") || msg.includes("ગુડબાય") || msg.includes("bye")) {
            return "આવજો મારા દોસ્ત! 👋 ફરી વાત કરવા આવજો. તમારી સાથે વાત કરીને મને ખૂબ મજા આવી. હમેશાં હસતા રહો! 🌟😊";
        }
        
        // Default response for anything else
        return "વાહ! તમે ઘણી સરસ વાત કરી. 🧸 હું તમારી સાથે વાત કરીને ખૂબ ખુશ છું. તમે મને તમારા વિશે કંઈક નવું કહેશો? મને તમારી વાતો સાંભળવી ગમે છે! 💬✨";
    }

    // ========== SPEECH SYNTHESIS ==========
    function speakVidushi(message) {
        // Stop any ongoing speech
        if (currentUtterance) {
            window.speechSynthesis.cancel();
        }
        
        // Update bubble with animation
        speechBubble.style.opacity = '0';
        setTimeout(() => {
            speechBubble.innerHTML = message + " 🧸";
            speechBubble.style.opacity = '1';
            speechBubble.classList.add('fade-in');
            setTimeout(() => speechBubble.classList.remove('fade-in'), 300);
        }, 100);
        
        // Change avatar emoji while speaking
        avatarEmoji.style.animation = 'wave 0.5s ease-in-out 3';
        setTimeout(() => {
            avatarEmoji.style.animation = '';
        }, 1500);
        
        // Speak
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.lang = 'gu-IN';
        utterance.rate = 0.95;
        utterance.pitch = 1.2;
        utterance.volume = 1;
        
        utterance.onstart = () => {
            statusText.innerHTML = "🗣️ વિદુષી બોલે છે...";
        };
        
        utterance.onend = () => {
            statusText.innerHTML = "🎤 માઇક દબાવો અને બોલો";
            currentUtterance = null;
        };
        
        utterance.onerror = () => {
            statusText.innerHTML = "🔊 ફરી પ્રયત્ન કરો";
            currentUtterance = null;
        };
        
        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
    }

    // ========== HANDLE USER INPUT (TEXT) ==========
    function handleUserInput(text) {
        if (!text.trim()) return;
        
        // Show user message in bubble temporarily
        const originalBubble = speechBubble.innerHTML;
        speechBubble.innerHTML = `🧒 તમે: "${text}"`;
        speechBubble.classList.add('fade-in');
        
        setTimeout(() => {
            // Get AI reply
            const reply = getVidushiReply(text);
            speakVidushi(reply);
        }, 500);
        
        // Clear input
        messageInput.value = '';
    }

    // ========== VOICE RECOGNITION ==========
    function startVoiceRecognition() {
        if (!hasSpeechRecognition) {
            statusText.innerHTML = "😟 તમારું બ્રાઉઝર માઇક સપોર્ટ કરતું નથી. કૃપા કરીને Chrome, Edge અથવા Safari વાપરો.";
            return;
        }
        
        if (isListening) {
            recognition.stop();
            return;
        }
        
        try {
            recognition.start();
            isListening = true;
            micBtn.classList.add('listening');
            statusText.innerHTML = "🎙️ સાંભળી રહ્યું છું... હવે બોલો! 🎙️";
            speechBubble.innerHTML = "👂 હું સાંભળું છું... તમે કંઈક કહો!";
        } catch (error) {
            console.error("Recognition error:", error);
            statusText.innerHTML = "🔁 ફરી પ્રયત્ન કરો, માઇક બટન દબાવો";
            isListening = false;
            micBtn.classList.remove('listening');
        }
    }
    
    if (hasSpeechRecognition) {
        recognition.onstart = () => {
            isListening = true;
            micBtn.classList.add('listening');
            statusText.innerHTML = "🎙️ સાંભળી રહ્યું છું... બોલો! 🎙️";
        };
        
        recognition.onresult = (event) => {
            const userSpeech = event.results[0][0].transcript;
            statusText.innerHTML = `📢 તમે કહ્યું: "${userSpeech}"`;
            
            // Process the voice input
            const reply = getVidushiReply(userSpeech);
            speakVidushi(reply);
            
            isListening = false;
            micBtn.classList.remove('listening');
        };
        
        recognition.onerror = (event) => {
            console.error("Recognition error:", event.error);
            let errorMsg = "🔊 સ્પષ્ટ બોલો અને ફરી પ્રયત્ન કરો!";
            if (event.error === 'not-allowed') {
                errorMsg = "🎤 માઇક પરમિશન જરૂરી છે! કૃપા કરીને પરમિશન આપો.";
            }
            statusText.innerHTML = errorMsg;
            isListening = false;
            micBtn.classList.remove('listening');
        };
        
        recognition.onend = () => {
            isListening = false;
            micBtn.classList.remove('listening');
            if (!currentUtterance) {
                statusText.innerHTML = "🎤 માઇક દબાવો અને બોલો";
            }
        };
    }

    // ========== EVENT LISTENERS ==========
    // Send button click
    sendBtn.addEventListener('click', () => {
        const userText = messageInput.value;
        handleUserInput(userText);
    });
    
    // Enter key in input
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const userText = messageInput.value;
            handleUserInput(userText);
        }
    });
    
    // Mic button click
    micBtn.addEventListener('click', () => {
        if (currentUtterance) {
            window.speechSynthesis.cancel();
        }
        startVoiceRecognition();
    });
    
    // Suggestion chips
    document.querySelectorAll('.suggestion-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const text = chip.getAttribute('data-text');
            messageInput.value = text;
            handleUserInput(text);
        });
    });
    
    // Welcome message
    setTimeout(() => {
        speakVidushi("નમસ્તે! હું વિદુષી છું. તમે મને લખીને કે બોલીને સવાલ પૂછી શકો છો. ચાલો વાત કરીએ!");
    }, 500);
    
    // Focus input on mobile
    messageInput.addEventListener('focus', () => {
        messageInput.style.borderColor = '#f5576c';
    });
    
    messageInput.addEventListener('blur', () => {
        messageInput.style.borderColor = '#e0e0e0';
    });
</script>
</body>
</html>
