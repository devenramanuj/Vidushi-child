<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>વિદુષી - ગણિત શીખો | સ્માર્ટ બાળ મિત્ર</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Neue', 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Container */
        .app-container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Character Header */
        .character-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 30px 20px 40px 20px;
            text-align: center;
            position: relative;
        }

        .avatar-circle {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            border: 5px solid white;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .avatar-emoji {
            font-size: 70px;
            animation: wave 1s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        .character-name {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-top: 10px;
        }

        .character-tag {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            margin-top: 5px;
        }

        /* Math Badge */
        .math-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffd700;
            color: #8b4513;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Speech Bubble */
        .bubble-container {
            background: white;
            margin: -20px 20px 20px 20px;
            padding: 20px;
            border-radius: 35px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
        }

        .speech-bubble {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 25px;
            font-size: 18px;
            line-height: 1.5;
            color: #2c3e50;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 500;
            border: 2px solid #ffd89a;
            flex-direction: column;
            gap: 10px;
        }

        .math-question {
            background: #ffeaa7;
            padding: 12px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #d63031;
            margin-top: 10px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 2px solid #f0f0f0;
        }

        .message-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .message-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .message-input:focus {
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245,87,108,0.1);
        }

        .send-btn {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            color: white;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Mic Button */
        .mic-section {
            text-align: center;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 4px solid white;
            border-radius: 50%;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        .mic-btn.listening {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245,87,108,0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(245,87,108,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245,87,108,0); }
        }

        .status-text {
            margin-top: 15px;
            font-size: 14px;
            color: #7f8c8d;
            text-align: center;
        }

        /* Suggestions */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .suggestion-chip {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #555;
        }

        .suggestion-chip:active {
            background: #f5576c;
            color: white;
            transform: scale(0.95);
        }

        .math-chip {
            background: #ffeaa7;
            color: #d63031;
            font-weight: bold;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        .correct-answer {
            background: #6c5ce7;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            animation: celebrate 0.5s ease;
        }

        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Character Header -->
    <div class="character-header">
        <div class="math-badge">🧮 ગણિત નિષ્ણાત 🧮</div>
        <div class="avatar-circle">
            <div class="avatar-emoji" id="avatarEmoji">🧸📚</div>
        </div>
        <div class="character-name">વિદુષી</div>
        <div class="character-tag">✨ ગણિત શીખો | રમતો રમો ✨</div>
    </div>

    <!-- Speech Bubble -->
    <div class="bubble-container">
        <div class="speech-bubble" id="speechBubble">
            🧸 હેલો! હું વિદુષી છું.<br>
            મને ગણિત ખૂબ ગમે છે!<br>
            તમે પૂછો: 5+3 = ? કે 7+9 = ?<br>
            હું જવાબ આપીશ!
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="message-box">
            <input type="text" id="messageInput" class="message-input" placeholder="✏️ ગણિત પૂછો કે વાત કરો... (જેમ કે: 7+9=?)" autocomplete="off">
            <button class="send-btn" id="sendBtn">📤</button>
        </div>

        <div class="mic-section">
            <button class="mic-btn" id="micBtn">🎤</button>
            <div class="status-text" id="statusText">🔊 માઇક દબાવો અને બોલો</div>
        </div>

        <!-- Quick Suggestions with Math -->
        <div class="suggestions">
            <div class="suggestion-chip math-chip" data-text="5+3=કેટલા">🧮 5+3 = ?</div>
            <div class="suggestion-chip math-chip" data-text="7+9=કેટલા">🧮 7+9 = ?</div>
            <div class="suggestion-chip math-chip" data-text="12-4=કેટલા">🧮 12-4 = ?</div>
            <div class="suggestion-chip math-chip" data-text="6×2=કેટલા">🧮 6×2 = ?</div>
            <div class="suggestion-chip" data-text="મને ગણિત શીખવો">📖 ગણિત શીખવો</div>
            <div class="suggestion-chip" data-text="ગણિતની રમત રમાડો">🎮 ગણિત રમત</div>
        </div>
    </div>
</div>

<script>
    // DOM Elements
    const speechBubble = document.getElementById('speechBubble');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');
    const avatarEmoji = document.getElementById('avatarEmoji');

    // Speech Recognition Setup
    let recognition = null;
    let isListening = false;
    let currentUtterance = null;
    let mathChallengeMode = false;
    let currentMathQuestion = null;

    // Check browser support for Speech Recognition
    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    const hasSpeechRecognition = SpeechRecognitionAPI !== undefined;

    if (hasSpeechRecognition) {
        recognition = new SpeechRecognitionAPI();
        recognition.lang = 'gu-IN';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
    }

    // ========== MATH PROBLEM SOLVER ==========
    function solveMathProblem(question) {
        // Remove spaces and convert to lowercase
        const cleanQuestion = question.toLowerCase().replace(/\s/g, '');
        
        // Pattern matching for various math operations
        const patterns = [
            { regex: /(\d+)[+加](\d+)/, operation: 'add' },
            { regex: /(\d+)[-减](\d+)/, operation: 'subtract' },
            { regex: /(\d+)[×x*](\d+)/, operation: 'multiply' },
            { regex: /(\d+)[÷/](\d+)/, operation: 'divide' },
            { regex: /(\d+)\s*[+加]\s*(\d+)/, operation: 'add' },
            { regex: /(\d+)\s*[-减]\s*(\d+)/, operation: 'subtract' },
            { regex: /(\d+)\s*[×x*]\s*(\d+)/, operation: 'multiply' },
            { regex: /(\d+)\s*[÷/]\s*(\d+)/, operation: 'divide' }
        ];
        
        for (let pattern of patterns) {
            const match = cleanQuestion.match(pattern.regex);
            if (match) {
                const num1 = parseInt(match[1]);
                const num2 = parseInt(match[2]);
                let result;
                let operationWord;
                
                switch(pattern.operation) {
                    case 'add':
                        result = num1 + num2;
                        operationWord = 'સરવાળો';
                        break;
                    case 'subtract':
                        result = num1 - num2;
                        operationWord = 'બાદબાકી';
                        break;
                    case 'multiply':
                        result = num1 * num2;
                        operationWord = 'ગુણાકાર';
                        break;
                    case 'divide':
                        if (num2 !== 0) {
                            result = num1 / num2;
                            result = result % 1 === 0 ? result : result.toFixed(2);
                        } else {
                            return "શૂન્ય વડે ભાગાકાર શક્ય નથી! 😊";
                        }
                        operationWord = 'ભાગાકાર';
                        break;
                }
                
                return {
                    answer: result,
                    explanation: `${num1} અને ${num2} નો ${operationWord} ${result} થાય છે! 🎉`,
                    num1: num1,
                    num2: num2,
                    operation: pattern.operation
                };
            }
        }
        return null;
    }
    
    // Generate random math question for quiz
    function generateMathQuestion() {
        const operations = ['add', 'subtract', 'multiply'];
        const operation = operations[Math.floor(Math.random() * operations.length)];
        let num1, num2, question, answer;
        
        switch(operation) {
            case 'add':
                num1 = Math.floor(Math.random() * 20) + 1;
                num2 = Math.floor(Math.random() * 20) + 1;
                question = `${num1} + ${num2} = ?`;
                answer = num1 + num2;
                break;
            case 'subtract':
                num1 = Math.floor(Math.random() * 30) + 10;
                num2 = Math.floor(Math.random() * num1) + 1;
                question = `${num1} - ${num2} = ?`;
                answer = num1 - num2;
                break;
            case 'multiply':
                num1 = Math.floor(Math.random() * 10) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
                question = `${num1} × ${num2} = ?`;
                answer = num1 * num2;
                break;
        }
        
        return { question, answer, num1, num2, operation };
    }
    
    // Check if message is answering a math question
    function checkMathAnswer(userMessage, currentQuestion) {
        if (!currentQuestion) return null;
        
        // Extract numbers from user message
        const numbers = userMessage.match(/\d+/g);
        if (numbers) {
            const userAnswer = parseInt(numbers[0]);
            if (userAnswer === currentQuestion.answer) {
                return true;
            }
        }
        
        // Check for Gujarati number words
        const gujNumbers = {
            'એક': 1, 'બે': 2, 'ત્રણ': 3, 'ચાર': 4, 'પાંચ': 5,
            'છ': 6, 'સાત': 7, 'આઠ': 8, 'નવ': 9, 'દસ': 10,
            'અગિયાર': 11, 'બાર': 12, 'તેર': 13, 'ચૌદ': 14, 'પંદર': 15,
            'સોળ': 16, 'સત્તર': 17, 'અઢાર': 18, 'ઓગણિસ': 19, 'વીસ': 20
        };
        
        for (let [word, value] of Object.entries(gujNumbers)) {
            if (userMessage.includes(word) && value === currentQuestion.answer) {
                return true;
            }
        }
        
        return false;
    }

    // ========== KID-FRIENDLY RESPONSES WITH MATH ==========
    function getVidushiReply(userMessage) {
        const msg = userMessage.toLowerCase().trim();
        
        // Check if it's a math problem
        const mathSolution = solveMathProblem(msg);
        if (mathSolution) {
            return `🔢 ${mathSolution.explanation} શું તમને બીજો દાખલો જોઈએ? 🤔`;
        }
        
        // Check if answering a math challenge
        if (mathChallengeMode && currentMathQuestion) {
            const isCorrect = checkMathAnswer(msg, currentMathQuestion);
            if (isCorrect) {
                mathChallengeMode = false;
                const newQuestion = generateMathQuestion();
                currentMathQuestion = newQuestion;
                return `વાહ! શાબ્બાશ! 🎉 તમારો જવાબ સાચો છે! ✨\n\nહવે આ જવાબ આપો: ${newQuestion.question}\n\nજવાબ લખો કે બોલો! 📝`;
            } else {
                return `અરે! ${currentMathQuestion.question} નો જવાબ ${currentMathQuestion.answer} થાય છે. 😊 ફરી પ્રયત્ન કરો!\n\nનવો દાખલો: ${generateMathQuestion().question}\nજવાબ શું છે? 🤗`;
            }
        }
        
        // Math learning request
        if (msg.includes("ગણિત શીખવો") || msg.includes("math teach")) {
            const newQuestion = generateMathQuestion();
            mathChallengeMode = true;
            currentMathQuestion = newQuestion;
            return `ચાલો ગણિત શીખીએ! 🧮\n\n${newQuestion.question}\n\nજવાબ શું છે? લખો કે બોલો! 📝✨`;
        }
        
        // Math game
        if (msg.includes("ગણિત રમત") || msg.includes("math game")) {
            const newQuestion = generateMathQuestion();
            mathChallengeMode = true;
            currentMathQuestion = newQuestion;
            return `ગણિત રમત રમવી છે? 🎮\n\nસવાલ: ${newQuestion.question}\n\nજવાબ આપો અને સ્કોર કરો! 🏆`;
        }
        
        // Specific math queries
        if (msg.includes("સરવાળો") || msg.includes("addition")) {
            return "સરવાળો એટલે બે સંખ્યાઓને ઉમેરવી. ઉદાહરણ: 5 + 3 = 8. તમે કોઈ દાખલો પૂછો! 🧮";
        }
        
        if (msg.includes("બાદબાકી") || msg.includes("subtraction")) {
            return "બાદબાકી એટલે એક સંખ્યામાંથી બીજી સંખ્યા ઘટાડવી. ઉદાહરણ: 10 - 4 = 6. કોઈ દાખલો અજમાવો? 😊";
        }
        
        if (msg.includes("ગુણાકાર") || msg.includes("multiplication")) {
            return "ગુણાકાર એટલે વારંવાર સરવાળો. જેમ કે 3 × 4 = 3+3+3+3 = 12. તમે કોઈ ગુણાકાર પૂછો! ✖️";
        }
        
        if (msg.includes("ભાગાકાર") || msg.includes("division")) {
            return "ભાગાકાર એટલે સરખા ભાગમાં વહેંચવું. જેમ કે 12 ÷ 3 = 4. કોઈ દાખલો પૂછો! ➗";
        }
        
        // Greetings
        if (msg.includes("નમસ્તે") || msg.includes("હેલો") || msg.includes("હાય")) {
            return "નમસ્તે મારા દોસ્ત! 🧸 તમે કેમ છો? આજે ગણિત શીખવું છે કે વાત કરવી છે? 😊";
        }
        
        // Name
        if (msg.includes("નામ")) {
            return "મારું નામ વિદુષી છે! 🌸 હું ગણિત શીખવવામાં માહિર છું. તમે કોઈ પણ દાખલો પૂછી શકો છો! 📚";
        }
        
        // Stories
        if (msg.includes("વાર્તા") || msg.includes("કહાની")) {
            return "એક વાર એક ગણિતનો રાજા હતો... 🧮 તે બાળકોને સરવાળા અને બાદબાકી શીખવતો. તમે પણ ગણિત શીખવા માંગો છો? 📖";
        }
        
        // Default response
        return "હું ગણિતના દાખલા ઉકેલી શકું છું! 🧮\n\nઉદાહરણ: 7+9=?, 15-6=?, 4×3=?\n\nકોઈ પણ દાખલો પૂછો, હું જવાબ આપીશ! 😊✨";
    }

    // ========== SPEECH SYNTHESIS ==========
    function speakVidushi(message) {
        if (currentUtterance) {
            window.speechSynthesis.cancel();
        }
        
        // Update bubble with animation
        speechBubble.style.opacity = '0';
        setTimeout(() => {
            // Format message with math styling if needed
            let displayMessage = message;
            if (message.includes("➕") || message.includes("➖") || message.includes("✖️") || message.includes("➗")) {
                displayMessage = message.replace(/\n/g, '<br>');
            }
            speechBubble.innerHTML = displayMessage + " 🧸";
            speechBubble.style.opacity = '1';
            speechBubble.classList.add('fade-in');
            setTimeout(() => speechBubble.classList.remove('fade-in'), 300);
        }, 100);
        
        // Change avatar emoji while speaking
        avatarEmoji.style.animation = 'wave 0.5s ease-in-out 3';
        setTimeout(() => {
            avatarEmoji.style.animation = '';
        }, 1500);
        
        // Speak
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.lang = 'gu-IN';
        utterance.rate = 0.95;
        utterance.pitch = 1.2;
        utterance.volume = 1;
        
        utterance.onstart = () => {
            statusText.innerHTML = "🗣️ વિદુષી બોલે છે...";
        };
        
        utterance.onend = () => {
            statusText.innerHTML = "🎤 માઇક દબાવો અને બોલો";
            currentUtterance = null;
        };
        
        utterance.onerror = () => {
            statusText.innerHTML = "🔊 ફરી પ્રયત્ન કરો";
            currentUtterance = null;
        };
        
        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
    }

    // ========== HANDLE USER INPUT ==========
    function handleUserInput(text) {
        if (!text.trim()) return;
        
        // Show user message in bubble temporarily
        speechBubble.innerHTML = `🧒 તમે: "${text}"`;
        speechBubble.classList.add('fade-in');
        
        setTimeout(() => {
            // Get AI reply
            const reply = getVidushiReply(text);
            speakVidushi(reply);
        }, 500);
        
        // Clear input
        messageInput.value = '';
    }

    // ========== VOICE RECOGNITION ==========
    function startVoiceRecognition() {
        if (!hasSpeechRecognition) {
            statusText.innerHTML = "😟 તમારું બ્રાઉઝર માઇક સપોર્ટ કરતું નથી.";
            return;
        }
        
        if (isListening) {
            recognition.stop();
            return;
        }
        
        try {
            recognition.start();
            isListening = true;
            micBtn.classList.add('listening');
            statusText.innerHTML = "🎙️ સાંભળી રહ્યું છું... હવે ગણિતનો દાખલો કહો! 🎙️";
            speechBubble.innerHTML = "👂 હું સાંભળું છું... ગણિતનો સવાલ પૂછો!";
        } catch (error) {
            statusText.innerHTML = "🔁 ફરી પ્રયત્ન કરો";
            isListening = false;
            micBtn.classList.remove('listening');
        }
    }
    
    if (hasSpeechRecognition) {
        recognition.onstart = () => {
            isListening = true;
            micBtn.classList.add('listening');
            statusText.innerHTML = "🎙️ સાંભળી રહ્યું છું... બોલો! 🎙️";
        };
        
        recognition.onresult = (event) => {
            const userSpeech = event.results[0][0].transcript;
            statusText.innerHTML = `📢 તમે કહ્યું: "${userSpeech}"`;
            
            const reply = getVidushiReply(userSpeech);
            speakVidushi(reply);
            
            isListening = false;
            micBtn.classList.remove('listening');
        };
        
        recognition.onerror = () => {
            statusText.innerHTML = "🔊 સ્પષ્ટ બોલો અને ફરી પ્રયત્ન કરો!";
            isListening = false;
            micBtn.classList.remove('listening');
        };
        
        recognition.onend = () => {
            isListening = false;
            micBtn.classList.remove('listening');
            if (!currentUtterance) {
                statusText.innerHTML = "🎤 માઇક દબાવો અને બોલો";
            }
        };
    }

    // ========== EVENT LISTENERS ==========
    sendBtn.addEventListener('click', () => {
        handleUserInput(messageInput.value);
    });
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleUserInput(messageInput.value);
        }
    });
    
    micBtn.addEventListener('click', () => {
        if (currentUtterance) {
            window.speechSynthesis.cancel();
        }
        startVoiceRecognition();
    });
    
    // Suggestion chips
    document.querySelectorAll('.suggestion-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const text = chip.getAttribute('data-text');
            messageInput.value = text;
            handleUserInput(text);
        });
    });
    
    // Welcome message
    setTimeout(() => {
        speakVidushi("નમસ્તે! હું વિદુષી છું. મને ગણિત ખૂબ ગમે છે. તમે પૂછો 7+9=કેટલા? હું જવાબ આપીશ! ચાલો ગણિત શીખીએ!");
    }, 500);
</script>
</body>
</html>
