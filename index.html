<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>વિદુષી - સંવાદ</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* વિડિયો સેક્શન - ઈમેજ મુજબ ફૂલ વિથ */
        .video-container {
            flex: 1.5; position: relative;
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* માઇક બટન - વિડિયોની ધાર પર */
        .mic-wrap {
            position: absolute; bottom: -30px; left: 20px; z-index: 10;
        }
        
        .btn-mic {
            width: 60px; height: 60px; background: #ff7675;
            border: 4px solid white; border-radius: 50%;
            color: white; font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* વાતો કરવાનું સ્ટેટસ */
        .chat-container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; background: white;
        }

        #status-text {
            color: #636e72; font-size: 1.1rem;
            text-align: center; line-height: 1.6;
            max-width: 80%;
        }

        .pulse { animation: ring 1.5s infinite; }
        @keyframes ring { 0% { box-shadow: 0 0 0 0 rgba(255,118,117,0.4); } 70% { box-shadow: 0 0 0 15px rgba(255,118,117,0); } 100% { box-shadow: 0 0 0 0 rgba(255,118,117,0); } }
    </style>
</head>
<body onclick="startApp()">

<div class="video-container">
    <video id="v" autoplay muted loop playsinline>
        <source id="vs" src="silent.mp4" type="video/mp4">
    </video>
    <div class="mic-wrap">
        <button class="btn-mic" id="mBtn" onclick="listen()">🎤</button>
    </div>
</div>

<div class="chat-container">
    <div id="status-text">સ્ક્રીન પર ક્લિક કરો...</div>
</div>

<script>
    let active = false;
    const v = document.getElementById('v');
    const vs = document.getElementById('vs');
    const txt = document.getElementById('status-text');

    function setMood(m) {
        if (!vs.src.includes(m)) {
            vs.src = m + ".mp4";
            v.load(); v.play();
        }
    }

    function speak(message) {
        setMood('speaking');
        const s = new SpeechSynthesisUtterance(message);
        s.lang = 'gu-IN';
        s.onend = () => setMood('silent');
        window.speechSynthesis.speak(s);
    }

    function startApp() {
        if (active) return;
        active = true;
        txt.innerText = "વિદુષી સાંભળી રહી છે...";
        speak("જય શ્રી કૃષ્ણ, હું વિદુષી છું, મને દેવેન્દ્રભાઈ એ બનાવી છે, આજે આપણે શેના વિશે વાત કરીશું?");
    }

    function listen() {
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Rec) return;
        
        const r = new Rec();
        r.lang = 'gu-IN';
        r.onstart = () => {
            setMood('thinking');
            document.getElementById('mBtn').classList.add('pulse');
            txt.innerText = "હું સાંભળું છું...";
        };
        
        r.onresult = (e) => {
            document.getElementById('mBtn').classList.remove('pulse');
            const userSpeech = e.results[0][0].transcript;
            txt.innerText = "તમે કહ્યું: " + userSpeech;
            
            // અહીં તમે સાદા જવાબ સેટ કરી શકો
            if(userSpeech.includes("કેમ છો")) {
                speak("હું મજામાં છું, તમે કેમ છો?");
            } else {
                setMood('smiling');
                speak("તમારી સાથે વાત કરીને ખૂબ આનંદ થયો.");
            }
        };
        
        r.onerror = () => {
            document.getElementById('mBtn').classList.remove('pulse');
            setMood('silent');
            txt.innerText = "ફરીથી બોલો...";
        };
        
        r.start();
    }
</script>

</body>
</html>
